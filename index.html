<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMBER ATLAS</title>
  <script src="https://unpkg.com/pmtiles@3.0.6/dist/pmtiles.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0e12;
      --surface: #111820;
      --border: #1e2d3d;
      --accent: #00d4ff;
      --accent2: #ff6b2b;
      --text: #c8d8e8;
      --muted: #4a6070;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 4px;
      color: var(--accent);
    }

    .logo span {
      color: var(--accent2);
    }

    .stats {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .stats b {
      color: var(--accent);
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .sidebar {
      width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-title {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      padding: 16px 16px 8px;
      text-transform: uppercase;
    }

    .filter-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 8px;
    }

    .filter-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 8px 10px;
      background: none;
      border: 1px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      text-align: left;
      transition: all 0.15s;
      margin-bottom: 2px;
    }

    .filter-btn:hover {
      background: rgba(0, 212, 255, 0.05);
      border-color: var(--border);
    }

    .filter-btn.active {
      background: rgba(0, 212, 255, 0.08);
      border-color: var(--accent);
      color: var(--accent);
    }

    .filter-btn .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .filter-btn .count {
      margin-left: auto;
      font-size: 10px;
      color: var(--muted);
    }

    #map {
      flex: 1;
      position: relative;
    }

    .maplibregl-popup-content {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 6px !important;
      padding: 0 !important;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6) !important;
      min-width: 220px;
    }

    .popup-inner {
      padding: 14px;
    }

    .popup-type {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 6px;
    }

    .popup-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      color: var(--accent);
      letter-spacing: 1px;
      margin-bottom: 10px;
      line-height: 1.1;
    }

    .popup-row {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--muted);
      padding: 3px 0;
      border-bottom: 1px solid var(--border);
    }

    .popup-row:last-child {
      border-bottom: none;
    }

    .popup-row span:last-child {
      color: var(--text);
      text-align: right;
      max-width: 130px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #loading {
      position: absolute;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 16px;
      transition: opacity 0.4s;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 8px;
      color: var(--accent);
    }

    .loading-bar {
      width: 200px;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
    }

    .loading-bar-inner {
      height: 100%;
      background: var(--accent);
      animation: loading 1.5s ease-in-out infinite;
    }

    @keyframes loading {
      0% {
        width: 0%;
        margin-left: 0
      }

      50% {
        width: 60%;
        margin-left: 20%
      }

      100% {
        width: 0%;
        margin-left: 100%
      }
    }

    .loading-text {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
    }

    .maplibregl-ctrl-bottom-right,
    .maplibregl-ctrl-bottom-left {
      display: none;
    }

    .maplibregl-ctrl-group {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 4px !important;
    }

    .maplibregl-ctrl-group button {
      background: none !important;
      color: var(--text) !important;
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">AMBER <span>ATLAS</span></div>
    <div class="stats" id="stats">LOADING…</div>
  </header>
  <div class="main">
    <aside class="sidebar">
      <div class="sidebar-title">Filter by type</div>
      <div class="filter-list" id="filter-list">
        <button class="filter-btn active" data-type="all">
          <span class="dot" style="background:#00d4ff"></span>
          All types
          <span class="count" id="count-all">—</span>
        </button>
      </div>
    </aside>
    <div id="map">
      <div id="loading">
        <div class="loading-logo">AMBER ATLAS</div>
        <div class="loading-bar">
          <div class="loading-bar-inner"></div>
        </div>
        <div class="loading-text" id="loading-text">LOADING TILES…</div>
      </div>
    </div>
  </div>
  <script>
    const PMTILES_URL = 'https://blueriversfoundation.github.io/AMBER-ATLAS/carte.pmtiles';
    const SOURCE_LAYER = 'atlas';

    const COLOR_EXPR = [
      'match', ['downcase', ['coalesce', ['get', 'type'], 'other']],
      'ramp', '#00d4ff',
      'dam', '#ff6b2b',
      'weir', '#ffd700',
      'ford', '#a8ff78',
      'culvert', '#ff6eb4',
      'sluice', '#c084fc',
      '#94a3b8'
    ];

    const TYPE_COLORS = { ramp: '#00d4ff', dam: '#ff6b2b', weir: '#ffd700', ford: '#a8ff78', culvert: '#ff6eb4', sluice: '#c084fc', other: '#94a3b8' };
    const colorForType = t => TYPE_COLORS[(t || 'other').toLowerCase()] || '#94a3b8';

    const protocol = new pmtiles.Protocol();
    maplibregl.addProtocol('pmtiles', protocol.tile);

    const map = new maplibregl.Map({
      container: 'map',
      style: {
        version: 8,
        glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
        sources: {
          basemap: { type: 'raster', tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'], tileSize: 256, attribution: '© OpenStreetMap' },
          amber: { type: 'vector', url: `pmtiles://${PMTILES_URL}` }
        },
        layers: [
          { id: 'basemap', type: 'raster', source: 'basemap', paint: { 'raster-opacity': 0.25, 'raster-saturation': -0.8, 'raster-brightness-min': 0.0, 'raster-brightness-max': 0.3 } },
          { id: 'poi-halo', type: 'circle', source: 'amber', 'source-layer': SOURCE_LAYER, paint: { 'circle-radius': ['interpolate', ['linear'], ['zoom'], 4, 3, 10, 7, 14, 11], 'circle-color': COLOR_EXPR, 'circle-opacity': 0.15, 'circle-blur': 1 } },
          { id: 'poi', type: 'circle', source: 'amber', 'source-layer': SOURCE_LAYER, paint: { 'circle-radius': ['interpolate', ['linear'], ['zoom'], 4, 2, 10, 4, 14, 7], 'circle-color': COLOR_EXPR, 'circle-stroke-width': 0.5, 'circle-stroke-color': '#ffffff', 'circle-stroke-opacity': 0.3 } }
        ]
      },
      center: [10, 50], zoom: 4, maxZoom: 18
    });

    map.addControl(new maplibregl.NavigationControl(), 'top-right');

    map.on('load', () => {
      document.getElementById('loading').classList.add('hidden');
      buildFilters();
      updateStats();
    });

    map.on('error', e => {
      document.getElementById('loading-text').style.color = '#ff6b2b';
      document.getElementById('loading-text').textContent = 'ERREUR : ' + (e.error?.message || 'Impossible de charger les tuiles');
      document.querySelector('.loading-bar').style.display = 'none';
    });

    setTimeout(() => {
      if (!document.getElementById('loading').classList.contains('hidden')) {
        document.getElementById('loading-text').style.color = '#ff6b2b';
        document.getElementById('loading-text').textContent = 'TIMEOUT — fichier .pmtiles inaccessible';
        document.querySelector('.loading-bar').style.display = 'none';
      }
    }, 15000);

    map.on('moveend', () => { buildFilters(); updateStats(); });

    function updateStats() {
      const n = map.queryRenderedFeatures({ layers: ['poi'] }).length;
      document.getElementById('stats').innerHTML = `<b>${n.toLocaleString()}</b> POINTS IN VIEW`;
    }

    function buildFilters() {
      const features = map.queryRenderedFeatures({ layers: ['poi'] });
      const typeCounts = {};
      features.forEach(f => { const t = (f.properties.type || 'other').toLowerCase(); typeCounts[t] = (typeCounts[t] || 0) + 1; });
      document.getElementById('count-all').textContent = features.length.toLocaleString();
      const list = document.getElementById('filter-list');
      Object.entries(typeCounts).sort((a, b) => b[1] - a[1]).forEach(([type, count]) => {
        if (list.querySelector(`[data-type="${type}"]`)) return;
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.type = type;
        btn.innerHTML = `<span class="dot" style="background:${colorForType(type)}"></span>${type}<span class="count">${count.toLocaleString()}</span>`;
        btn.addEventListener('click', () => setFilter(type));
        list.appendChild(btn);
      });
    }

    function setFilter(type) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-type="${type}"]`).classList.add('active');
      const filter = type === 'all' ? null : ['==', ['downcase', ['coalesce', ['get', 'type'], 'other']], type];
      map.setFilter('poi', filter);
      map.setFilter('poi-halo', filter);
      updateStats();
    }

    document.querySelector('[data-type="all"]').addEventListener('click', () => setFilter('all'));

    const popup = new maplibregl.Popup({ closeButton: false, maxWidth: '300px' });
    map.on('click', 'poi', e => {
      const p = e.features[0].properties;
      const coords = e.features[0].geometry.coordinates.slice();
      const rows = [['Basin', p.BasinName], ['River', p.RiverName], ['Country', p.Country], ['Height', p.Height], ['ZHYD', p.ZHYD]].filter(([, v]) => v && v !== 'NA' && v !== 'null');
      popup.setLngLat(coords).setHTML(`
      <div class="popup-inner">
        <div class="popup-type">${(p.type || 'unknown').toUpperCase()}</div>
        <div class="popup-name">${p.LabelAtlas || p.RiverName || '—'}</div>
        ${rows.map(([k, v]) => `<div class="popup-row"><span>${k}</span><span>${v}</span></div>`).join('')}
      </div>`).addTo(map);
    });
    map.on('mouseenter', 'poi', () => map.getCanvas().style.cursor = 'pointer');
    map.on('mouseleave', 'poi', () => map.getCanvas().style.cursor = '');
  </script>
</body>

</html>
